<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            background: white;
            width: 300px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            display: block;
        }

        button {
            padding: 10px;
            width: 100%;
            background: blue;
            color: white;
            border: none;
            margin-top: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form method="POST">
        <!-- Username -->
        <input type="text" name="username" placeholder="Enter Username" required>

        <!-- Password -->
        <input type="password" name="password" placeholder="Enter Password" required>

        <!-- Button -->
        <button type="submit">Login</button>
    </form>

    <!-- Register -->
    <a href="/register">New user? Register</a>
</div>

</body>
</html>
