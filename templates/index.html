<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f7fa; }

.card {
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

button {
background:green;
color:white;
padding:10px;
border:none;
margin:5px;
}
.hidden { display:none; }
</style>

<script>
function show(id){
document.getElementById("add").style.display="none";
document.getElementById("table").style.display="none";
document.getElementById("charts").style.display="none";
document.getElementById("budget").style.display="none";

document.getElementById(id).style.display="block";
}
</script>
</head>

<body>

<div class="card">
<h2>Total: ₹{{ total }}</h2>
<h3>Budget: ₹{{ budget }}</h3>
</div>

<div class="card">
<button onclick="show('add')">Add</button>
<button onclick="show('table')">Expenses</button>
<button onclick="show('charts')">Charts</button>
<button onclick="show('budget')">Budget</button>
</div>

<!-- ADD -->
<div id="add" class="card">
<form action="/add" method="POST">
<input type="number" name="amount" placeholder="Amount" required><br>
<input type="text" name="category" placeholder="Category" required><br>
<input type="date" name="date" required><br>
<button>Add</button>
</form>
</div>

<!-- TABLE -->
<div id="table" class="card hidden">
<table border="1">
<tr><th>₹</th><th>Category</th><th>Date</th><th>Action</th></tr>

{% for e in expenses %}
<tr>
<td>{{ e.amount }}</td>
<td>{{ e.category }}</td>
<td>{{ e.date }}</td>
<td>
<a href="/delete/{{ e._id }}">❌</a>
<a href="/edit/{{ e._id }}">✏</a>
</td>
</tr>
{% endfor %}
</table>
</div>

<!-- BUDGET -->
<div id="budget" class="card hidden">
<form action="/budget" method="POST">
<input type="number" name="budget" placeholder="Set Budget" required>
<button>Save</button>
</form>
</div>

<!-- CHARTS -->
<div id="charts" class="card hidden">

<div style="width:300px;height:300px;margin:auto;">
<canvas id="catChart"></canvas>
</div>

<br><br>

<div style="width:500px;margin:auto;">
<canvas id="monthChart"></canvas>
</div>

</div>

<script>
let catData = {{ category_total | tojson }};
let monthData = {{ month_total | tojson }};

new Chart(document.getElementById("catChart"), {
type:"pie",
data:{labels:Object.keys(catData),datasets:[{data:Object.values(catData)}]},
options:{maintainAspectRatio:true}
});

new Chart(document.getElementById("monthChart"), {
type:"bar",
data:{labels:Object.keys(monthData),datasets:[{data:Object.values(monthData)}]}
});
</script>

</body>
</html>
