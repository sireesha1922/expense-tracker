<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f7fa;
}

.header {
    background: #4CAF50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.btn {
    background: #4CAF50;
    color: white;
    padding: 15px;
    border: none;
    border-radius: 8px;
    text-align: left;
    cursor: pointer;
}

.hidden {
    display: none;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}
</style>

<script>
function show(id){
    document.getElementById("add").style.display="none";
    document.getElementById("table").style.display="none";
    document.getElementById("charts").style.display="none";
    document.getElementById("budget").style.display="none";

    document.getElementById(id).style.display="block";
}
</script>
</head>

<body>

<div class="header">
💰 Expense Tracker | {{ session['user'] }}
</div>

<div class="card">
<h2>Total Spent</h2>
<h1>₹{{ total }}</h1>
</div>

<div class="card grid">
<button class="btn" onclick="show('add')">➕ Add</button>
<button class="btn" onclick="show('table')">📋 Expenses</button>
<button class="btn" onclick="show('charts')">📊 Charts</button>
<button class="btn" onclick="show('budget')">💰 Budget</button>
</div>

<!-- ADD -->
<div id="add" class="card">
<h3>Add Expense</h3>
<form action="/add" method="POST">
<input type="number" name="amount" placeholder="Amount" required>
<input type="text" name="category" placeholder="Category" required>
<input type="date" name="date" required>
<button class="btn">Add</button>
</form>
</div>

<!-- TABLE -->
<div id="table" class="card hidden">
<h3>Expenses</h3>
<table border="1" width="100%">
<tr><th>Amount</th><th>Category</th><th>Date</th><th>Action</th></tr>

{% for e in expenses %}
<tr>
<td>{{ e.amount }}</td>
<td>{{ e.category }}</td>
<td>{{ e.date }}</td>
<td>
<a href="/delete/{{ e._id }}">❌</a>
<a href="/edit/{{ e._id }}">✏</a>
</td>
</tr>
{% endfor %}

</table>
</div>

<!-- BUDGET -->
<div id="budget" class="card hidden">
<h3>Set Budget</h3>
<form action="/budget" method="POST">
<input type="number" name="budget" placeholder="Enter Budget">
<button class="btn">Save</button>
</form>
</div>

<!-- CHARTS -->
<div id="charts" class="card hidden">
<h3>Charts</h3>

<div style="width:300px;margin:auto;">
<canvas id="catChart"></canvas>
</div>

<br>

<div style="width:500px;margin:auto;">
<canvas id="monthChart"></canvas>
</div>

</div>

<script>
let catData = {{ category_total | tojson }};
let monthData = {{ month_total | tojson }};

new Chart(document.getElementById("catChart"), {
type: "pie",
data: {
labels: Object.keys(catData),
datasets: [{ data: Object.values(catData) }]
}
});

new Chart(document.getElementById("monthChart"), {
type: "bar",
data: {
labels: Object.keys(monthData),
datasets: [{ data: Object.values(monthData) }]
}
});
</script>

</body>
</html>
