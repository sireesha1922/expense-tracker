<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI'; background: #f5f7fa; }

        .header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container { padding: 15px; }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .menu button {
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .hidden { display: none; }

        input {
            width: 95%;
            padding: 10px;
            margin: 5px 0;
        }

        table { width: 100%; }

    </style>

    <script>
        function show(id) {
            let sections = document.getElementsByClassName("section");
            for (let i = 0; i < sections.length; i++) {
                sections[i].style.display = "none";
            }
            document.getElementById(id).style.display = "block";
        }
    </script>
</head>

<body>

<div class="header">
    💰 Expense Tracker | 👤 {{ session.user }}
</div>

<div class="container">

<div class="card">
    <h2>Total: ₹{{ total }}</h2>
    <h3>Budget: ₹{{ budget }}</h3>

    {% if total > budget and budget > 0 %}
    <p style="color:red;">⚠ Over Budget!</p>
    {% endif %}
</div>

<div class="card menu">
    <button onclick="show('add')">Add</button>
    <button onclick="show('table')">Expenses</button>
    <button onclick="show('charts')">Charts</button>
    <button onclick="show('budget')">Budget</button>
</div>

<div id="add" class="card section">
    <form action="/add" method="POST">
        <input type="number" name="amount" placeholder="Amount" required>
        <input type="text" name="category" placeholder="Category" required>
        <input type="date" name="date" required>
        <button>Add</button>
    </form>
</div>

<div id="table" class="card section hidden">
<table border="1">
<tr><th>₹</th><th>Category</th><th>Date</th><th>Action</th></tr>

{% for e in expenses %}
<tr>
<td>{{ e.amount }}</td>
<td>{{ e.category }}</td>
<td>{{ e.date }}</td>
<td>
<a href="/delete/{{ e._id }}">❌</a>
<a href="/edit/{{ e._id }}">✏</a>
</td>
</tr>
{% endfor %}

</table>
</div>

<div id="budget" class="card section hidden">
<form action="/budget" method="POST">
<input type="number" name="budget" placeholder="Set Budget" required>
<button>Save</button>
</form>
</div>

<div id="charts" class="card section hidden">
<div style="text-align:center;">
<canvas id="catChart" style="max-width:300px;"></canvas>
</div>
<br>
<canvas id="monthChart" style="max-width:500px;"></canvas>
</div>

</div>

<script>
let catData = {{ category_total | tojson }};
let monthData = {{ month_total | tojson }};

new Chart(document.getElementById("catChart"), {
type: "pie",
data: { labels: Object.keys(catData), datasets: [{ data: Object.values(catData) }] }
});

new Chart(document.getElementById("monthChart"), {
type: "bar",
data: { labels: Object.keys(monthData), datasets: [{ data: Object.values(monthData) }] }
});
</script>

</body>
</html>
