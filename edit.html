<!DOCTYPE html>
<html>
<body>

<h2>Edit Expense</h2>

<form method="POST">
    Amount: 
    <input type="number" name="amount" value="{{ e.amount }}" required><br><br>

    Category: 
    <input type="text" name="category" value="{{ e.category }}" required><br><br>

    Date: 
    <input type="date" name="date" value="{{ e.date }}" required><br><br>

    <button>Update</button>
</form>

</body>
</html>
